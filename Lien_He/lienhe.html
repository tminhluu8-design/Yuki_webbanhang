<div class="custom-contact-form" style="max-width: 500px; margin: 0 auto; padding: 20px; background: #f9f9f9; border-radius: 8px;">
    <form action="https://formspree.io/f/maqzrvqg" method="POST">
        <label style="display:block; margin-bottom:8px; font-weight:bold;">Họ và tên:</label>
        <input type="text" name="name" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

        <label style="display:block; margin-bottom:8px; font-weight:bold;">Số điện thoại / Email:</label>
        <input type="text" name="contact" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

        <label style="display:block; margin-bottom:8px; font-weight:bold;">Lời nhắn:</label>
        <textarea name="message" rows="4" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;"></textarea>

        <button type="submit" style="background:#ff5722; color:#fff; padding:12px 20px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; width:100%;">Gửi Liên Hệ</button>
    </form>
</div>
