<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Bán Hàng & Giỏ Hàng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Thanh điều hướng / Tiêu đề -->
    <header>
        <h1>Cửa Hàng Công Nghệ</h1>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Giỏ hàng (<span id="cart-count">0</span>)
        </div>
    </header>

    <main>
        <!-- Danh sách sản phẩm -->
        <section class="products-container">
            <h2>Sản phẩm nổi bật</h2>
            <div class="products-grid">
                <!-- Sản phẩm 1 -->
                <div class="product-card">
                    <img src="https://picsum.photos" alt="Laptop Pro">
                    <h3>Laptop Pro X1</h3>
                    <p class="price">25000000 ₫</p>
                    <button onclick="addToCart(1, 'Laptop Pro X1', 25000000)">Thêm vào giỏ</button>
                </div>
                <!-- Sản phẩm 2 -->
                <div class="product-card">
                    <img src="https://picsum.photos/id/237/200/300" alt="Thú cưng">
                    <h3>Con chó màu đen</h3>
                    <p class="price">12000000 ₫</p>
                    <button onclick="addToCart(2, 'Điện thoại Nova 5G', 12000000)">Thêm vào giỏ</button>
                </div>
                <!-- Sản phẩm 3 -->
                <div class="product-card">
                    <img src="https://picsum.photos" alt="Tai nghe">
                    <h3>Tai nghe không dây Bass+</h3>
                    <p class="price">1500000 ₫</p>
                    <button onclick="addToCart(3, 'Tai nghe không dây Bass+', 1500000)">Thêm vào giỏ</button>
                </div>
            </div>
        </section>

        <!-- Giao diện giỏ hàng -->
        <section id="cart-modal" class="cart-modal">
            <div class="cart-content">
                <span class="close-btn" onclick="toggleCart()">&times;</span>
                <h2>Giỏ Hàng Của Bạn</h2>
                <div id="cart-items">
                    <!-- Sản phẩm trong giỏ sẽ render ở đây -->
                     <p style="text-align: center; color: #888;">Giỏ hàng trống</p>
                </div>
                <div class="cart-summary">
                    <h3>Tổng tiền: <span id="cart-total">0 ₫</span></h3>
                    <button class="checkout-btn" onclick="checkout()">Thanh toán ngay</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
